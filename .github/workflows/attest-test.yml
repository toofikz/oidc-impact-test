name: Attest Test
on: [workflow_dispatch]
permissions:
  id-token: write
  contents: read
  attestations: write
jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifact
        run: echo "regex-test-$(date +%s)" > artifact.txt
      - name: Generate attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifact.txt
      - name: Show artifact hash
        run: sha256sum artifact.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: attested-artifact
          path: artifact.txt
          retention-days: 1
