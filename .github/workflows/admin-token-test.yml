name: OIDC Admin Token Test
on: [workflow_dispatch]
permissions:
  administration: write
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test OIDC with admin token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Token scopes ==="
          curl -sI -H "Authorization: token $GH_TOKEN" "https://api.github.com/" 2>&1 | grep -i "x-oauth-scopes\|x-accepted"
          
          echo "=== Read OIDC ==="
          curl -s -w "\nHTTP:%{http_code}" -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub"
          
          echo ""
          echo "=== Write OIDC ==="
          curl -s -w "\nHTTP:%{http_code}" -X PUT -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub" \
            -d '{"use_default": true, "use_immutable_subject": true}'
