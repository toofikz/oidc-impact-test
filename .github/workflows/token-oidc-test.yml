name: OIDC Config Test via GITHUB_TOKEN
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Read OIDC config with GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Read OIDC config ==="
          curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub"
          
          echo ""
          echo "=== Try to modify OIDC config ==="
          curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub" \
            -d '{"use_default": false, "use_immutable_subject": false, "include_claim_keys": ["repo"]}'
          
          echo ""
          echo "=== Verify ==="
          curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub"
