name: Permission Map Test
on: [workflow_dispatch]
permissions:
  contents: write
  actions: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Map GITHUB_TOKEN permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Actions variables ==="
          curl -s -w "\nHTTP:%{http_code}" -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
            -d '{"name":"GH_TOKEN_TEST","value":"test"}'
          
          echo ""
          echo "=== Actions secrets public key ==="
          curl -s -w "\nHTTP:%{http_code}" -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/secrets/public-key"
          
          echo ""
          echo "=== Deployment create ==="
          curl -s -w "\nHTTP:%{http_code}" -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/deployments" \
            -d '{"ref":"main","auto_merge":false,"required_contexts":[]}'
          
          echo ""
          echo "=== OIDC read ==="
          curl -s -w "\nHTTP:%{http_code}" -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/oidc/customization/sub"
          
          echo ""
          echo "=== Actions permissions read ==="
          curl -s -w "\nHTTP:%{http_code}" -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/permissions"
